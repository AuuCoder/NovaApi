# NovaAPI (sub2api) — muyuai.top, behind Cloudflare (Full SSL: CF->origin is HTTPS/443)

# 80: 回源兼容 + 跳 https
server {
    listen 80;
    listen [::]:80;
    server_name muyuai.top;
    return 301 https://$host$request_uri;
}

# 443: 主入口
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name muyuai.top;

    ssl_certificate     /etc/nginx/certs/muyuai.top.crt;
    ssl_certificate_key /etc/nginx/certs/muyuai.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100m;   # AI 网关大请求体留余量

    location = /health {
        proxy_pass http://127.0.0.1:8090/health;
    }

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        # WebSocket / SSE 流式支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
