# NovaAPI (sub2api) — muyuai.top, behind Cloudflare (Full SSL: CF->origin is HTTPS/443)

# 80: 回源兼容 + 跳 https
server {
    listen 80;
    listen [::]:80;
    server_name muyuai.top;
    return 301 https://$host$request_uri;
}

# 443: 主入口
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name muyuai.top;

    ssl_certificate     /etc/nginx/certs/muyuai.top.crt;
    ssl_certificate_key /etc/nginx/certs/muyuai.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100m;   # AI 网关大请求体留余量

    # ----------------------------------------------------------------
    # 网关 path 兼容:用户裸 base URL 时 SDK 没自动拼 /v1,或多拼了 /api。
    # 这里做内部 rewrite,让客户端怎么拼都能命中真正的网关路由 /v1/*。
    # 注意:仅 rewrite 网关语义的 path,不影响 /api/v1/* 后台管理和 /usage 前端页面。
    # ----------------------------------------------------------------
    location ~ ^/api/v1/(messages|chat/completions|models|responses|embeddings|images/.+|count_tokens|usage)(/.*)?$ {
        rewrite ^/api/v1/(.*)$ /v1/$1 last;
    }
    location ~ ^/(messages|chat/completions|responses|embeddings|images/.+|count_tokens)(/.*)?$ {
        rewrite ^/(.*)$ /v1/$1 last;
    }
    location = /models {
        rewrite ^ /v1/models last;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8090/health;
    }

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        # WebSocket / SSE 流式支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
