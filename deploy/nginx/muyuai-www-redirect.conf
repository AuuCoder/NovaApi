# 把 www.muyuai.top 永久 301 到 apex,统一 cookie 域
# 背景:OAuth state cookie 在 www 子域和 apex 之间不共享,会导致 LinuxDo 等
# OAuth provider 回调时 cookieHeaderLen=0、state 校验失败。统一收到 apex 即可。
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.muyuai.top;

    ssl_certificate     /etc/nginx/certs/muyuai.top.crt;
    ssl_certificate_key /etc/nginx/certs/muyuai.top.key;

    return 301 https://muyuai.top$request_uri;
}
