name: Build and push image to GHCR (main)

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docs/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/main-image.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: main-image
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name (lowercase)
        id: img
        run: |
          REPO="${{ github.repository }}"
          echo "name=ghcr.io/${REPO,,}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:main
            ${{ steps.img.outputs.name }}:sha-${{ steps.img.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GOPROXY=https://proxy.golang.org,direct
            GOSUMDB=sum.golang.org

      - name: Summary
        run: |
          echo "## Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.img.outputs.name }}:main\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.img.outputs.name }}:sha-${{ steps.img.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
